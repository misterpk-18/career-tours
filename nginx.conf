server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 13.126.175.239;

    # Maximum file upload size (resumes up to 10MB)
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/career_tours_access.log;
    error_log /var/log/nginx/career_tours_error.log info;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for heavy LLM operations
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
